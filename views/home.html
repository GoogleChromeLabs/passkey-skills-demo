<!DOCTYPE html>
<html lang="en">

<head>
  <title>{{title}}</title>
  <meta name="description" content="{{title}}">
  <link id="favicon" rel="icon" href="favicon.svg" type="image/x-icon">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/bundle.css">
  <link rel="stylesheet" href="/bundle-css.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <script src="components-bundle.js"></script>
</head>

<body>
  <mdui-top-app-bar style="position: relative;">
    <mdui-top-app-bar-title>{{title}}</mdui-top-app-bar-title>
    <a href="https://github.com/agektmr/passkey-skills"><mdui-button-icon icon="code"></mdui-button-icon></a>
  </mdui-top-app-bar>
  <mdui-linear-progress id="progress" class="hidden"></mdui-linear-progress>
  <main class="content center">
    <h2>
      Welcome, {{displayName}}!
    </h2>
    <section>
      <h3>
        Your name:
      </h3>
      <div id="display-name"></div>
    </section>
    <a href="/auth/signout"><mdui-button type="button">Sign out</mdui-button></a>
  </main>
  <script type="module">
    import {
      $,
      post,
      loading,
    } from '/client.js';
    import { html, render } from 'https://unpkg.com/lit-html@latest/lit-html.js?module';

    async function changeDisplayName(e) {
      const newName = prompt('Enter a new display name', e.target.dataset.displayName);
      if (newName) {
        loading.start();
        await post('/auth/updateDisplayName', { newName });
        loading.stop();
        renderDisplayName();
      }
    }

    async function renderDisplayName() {
      const res = await post('/auth/userinfo');
      render(html`
        <mdui-list>
          <mdui-list-item>
            ${res.displayName || res.username}
            <mdui-button-icon data-display-name="${res.displayName || res.username}" title="Edit your display name" @click="${changeDisplayName}" icon="edit" slot="end-icon"></mdui-button-icon>
          </mdui-list-item>
        <mdui-list>`, $('#display-name'));
    };

    renderDisplayName();

  </script>
</body>

</html>
